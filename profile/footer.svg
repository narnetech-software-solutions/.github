<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" role="img" aria-label="NarneTech terminal footer">
  <defs>
    <clipPath id="winF"><rect x="2" y="2" width="1196" height="146" rx="14"/></clipPath>
    <clipPath id="typeF">
      <rect x="80" y="58" width="0" height="34">
        <animate attributeName="width" values="0;430;430;0;0" keyTimes="0;0.42;0.66;0.84;1" dur="7.5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#winF)">
    <rect x="0" y="0" width="1200" height="150" fill="#0b1221"/>
    <rect x="0" y="0" width="1200" height="42" fill="#141d33"/>
    <line x1="0" y1="42" x2="1200" y2="42" stroke="#1f2a44" stroke-width="1"/>
    <circle cx="30" cy="21" r="6" fill="#ff5f56"/>
    <circle cx="52" cy="21" r="6" fill="#ffbd2e"/>
