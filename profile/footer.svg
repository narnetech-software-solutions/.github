    <text x="104" y="26" font-family="'JetBrains Mono','Fira Code',Consolas,Monaco,monospace" font-size="13" fill="#7d8aa3">narnetech@github: ~$</text>
  </g>

  <text x="40" y="84" font-family="'JetBrains Mono','Fira Code',Consolas,Monaco,monospace" font-size="22" font-weight="700" fill="#36c5ff">&gt;</text>
  <text x="80" y="84" clip-path="url(#typeF)" font-family="'JetBrains Mono','Fira Code',Consolas,Monaco,monospace" font-size="22" font-weight="600" fill="#ffffff">Let's build something that lasts.</text>
  <rect y="65" width="11" height="22" fill="#36c5ff">
